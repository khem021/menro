services:
  - type: web
    name: menro
    plan: free
    branch: main
    healthCheckPath: /
    buildCommand: composer install --no-dev --optimize-autoloader --no-interaction
    startCommand: php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: MENRO
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://menro.onrender.com
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: menro-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: menro-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: menro-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: menro-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: menro-db
          property: password
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: menro-db
    plan: free
    databaseName: menro
    user: menro
