[phases.setup]
nixPkgs = [
    "php81",
    "php81Extensions.pdo_mysql",
    "php81Extensions.mbstring",
    "php81Extensions.xml",
    "php81Extensions.tokenizer",
    "php81Extensions.ctype",
    "php81Extensions.fileinfo",
    "php81Extensions.zip",
    "php81Extensions.bcmath",
    "php81Extensions.openssl",
    "php81Extensions.pcntl",
    "php81Extensions.curl",
    "php81Extensions.gd",
    "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
